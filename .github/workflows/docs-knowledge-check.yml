name: Docs Knowledge Check

on:
  pull_request:
  push:
    branches:
      - dev
      - main
  schedule:
    - cron: "0 14 * * 1"

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: OpenClaw Topology Check
        run: node scripts/openclaw_topology_check.js

      - name: Workflow Integrity Check
        run: node scripts/workflow_integrity_check.js

      - name: Knowledge Base Lint
        run: node scripts/check_knowledge_base.js

      - name: Doc Gardener (Strict on schedule)
        if: github.event_name == 'schedule'
        run: node scripts/doc_gardener.js --strict

      - name: Security Preflight
        run: node scripts/security_preflight.js --strict

      - name: Pipeline Orchestrator Dry Run
        run: node scripts/pipeline_orchestrator_dry_run.js

      - name: Workflow Syntax Lint (actionlint)
        uses: rhysd/actionlint@v1
