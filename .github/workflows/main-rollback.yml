name: Main Rollback Orchestrator

on:
  workflow_dispatch:
    inputs:
      bad_sha:
        description: "Commit SHA on main to revert"
        required: true
        type: string
      target_base:
        description: "Base branch for rollback PR"
        required: false
        default: "main"
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  rollback-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target base
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_base }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "openclaw-bot"
          git config user.email "openclaw-bot@users.noreply.github.com"

      - name: Create rollback branch and revert
        env:
          BAD_SHA: ${{ inputs.bad_sha }}
          TARGET_BASE: ${{ inputs.target_base }}
        run: |
          set -euo pipefail
          SHORT_SHA="$(echo "$BAD_SHA" | cut -c1-8)"
          BRANCH="rollback/${SHORT_SHA}"
          git checkout -b "$BRANCH"
          git revert --no-edit "$BAD_SHA"
          git push origin "$BRANCH"
          echo "ROLLBACK_BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Open rollback PR
        uses: actions/github-script@v7
        env:
          TARGET_BASE: ${{ inputs.target_base }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = process.env.ROLLBACK_BRANCH;
            const base = process.env.TARGET_BASE || 'main';
            const title = `rollback: revert ${context.payload.inputs.bad_sha}`;
            const body = [
              'Automated rollback PR generated by Main Rollback Orchestrator.',
              '',
              `- bad_sha: ${context.payload.inputs.bad_sha}`,
              `- target_base: ${base}`,
              '',
              'Please review and merge after validation.'
            ].join('\n');
            await github.rest.pulls.create({ owner, repo, title, head, base, body });
