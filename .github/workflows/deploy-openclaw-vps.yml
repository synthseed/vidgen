name: Deploy OpenClaw VPS

on:
  workflow_run:
    workflows:
      - Docs Knowledge Check
    types:
      - completed

jobs:
  deploy-vps:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'dev' &&
      github.event.workflow_run.event == 'push' &&
      secrets.VPS_HOST != '' &&
      secrets.VPS_USER != '' &&
      secrets.VPS_SSH_KEY != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          command_timeout: 40m
          script: |
            set -e
            export REPO_DIR=/docker/openclaw-jnqf/data/repos/vidgen
            export PROJECT_DIR=/docker/openclaw-jnqf
            export BRANCH=dev
            export OPENCLAW_SERVICE=openclaw
            export OPENCLAW_HOME=/data/.openclaw
            bash /docker/openclaw-jnqf/data/repos/vidgen/scripts/vps_autosync_openclaw.sh
