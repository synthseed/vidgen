name: Deploy OpenClaw VPS

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: deploy-openclaw-vps-dev
  cancel-in-progress: true

jobs:
  deploy-vps:
    if: github.ref_name == 'dev'
    runs-on:
      - self-hosted
      - linux
    permissions:
      contents: read
    steps:
      - name: Trigger Summary
        run: |
          echo "event=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"
          echo "runner=${RUNNER_NAME}"
          echo "runner_os=${RUNNER_OS}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Autonomy Preflight (deploy gate)
        run: node scripts/autonomy_preflight.js --mode ci

      - name: Validate Host Prerequisites
        run: |
          set -euo pipefail
          command -v bash
          command -v git
          command -v node
          command -v docker
          command -v systemctl
          test -d /docker/openclaw-jnqf
          test -d /docker/openclaw-jnqf/data/repos/vidgen
          test -f /docker/openclaw-jnqf/docker-compose.yml
          docker compose -f /docker/openclaw-jnqf/docker-compose.yml config >/dev/null

      - name: Deploy Autosync
        run: |
          set -euo pipefail
          export REPO_DIR=/docker/openclaw-jnqf/data/repos/vidgen
          export PROJECT_DIR=/docker/openclaw-jnqf
          export BRANCH=dev
          export OPENCLAW_SERVICE=openclaw
          export OPENCLAW_HOME=/data/.openclaw
          bash /docker/openclaw-jnqf/data/repos/vidgen/scripts/vps_autosync_openclaw.sh

      - name: Post-deploy VPS Status Validation
        run: |
          set -euo pipefail
          export REPO_DIR=/docker/openclaw-jnqf/data/repos/vidgen
          export BRANCH=dev
          export STRICT_EXIT=1
          export LOG_LINES=120
          bash /docker/openclaw-jnqf/data/repos/vidgen/scripts/vps_autosync_status.sh

      - name: Collect VPS Diagnostics On Failure
        if: failure()
        run: |
          set +e
          export REPO_DIR=/docker/openclaw-jnqf/data/repos/vidgen
          export BRANCH=dev
          export LOG_LINES=200
          bash /docker/openclaw-jnqf/data/repos/vidgen/scripts/vps_autosync_status.sh || true
          journalctl -u vidgen-openclaw-autosync.service -n 200 --no-pager || true
