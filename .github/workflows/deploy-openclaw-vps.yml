name: Deploy OpenClaw VPS

on:
  workflow_run:
    workflows:
      - Docs Knowledge Check
    types:
      - completed

jobs:
  deploy-vps:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'dev' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate VPS Secrets
        id: vps_secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -n "$VPS_HOST" ] && [ -n "$VPS_USER" ] && [ -n "$VPS_SSH_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "VPS deploy secrets detected."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "VPS deploy secrets missing; skipping deploy step."
          fi

      - name: Deploy to VPS over SSH
        if: steps.vps_secrets.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          command_timeout: 40m
          script: |
            set -e
            export REPO_DIR=/docker/openclaw-jnqf/data/repos/vidgen
            export PROJECT_DIR=/docker/openclaw-jnqf
            export BRANCH=dev
            export OPENCLAW_SERVICE=openclaw
            export OPENCLAW_HOME=/data/.openclaw
            bash /docker/openclaw-jnqf/data/repos/vidgen/scripts/vps_autosync_openclaw.sh

      - name: Post-deploy VPS Status Validation
        if: steps.vps_secrets.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            export REPO_DIR=/docker/openclaw-jnqf/data/repos/vidgen
            export BRANCH=dev
            export STRICT_EXIT=1
            export LOG_LINES=120
            bash /docker/openclaw-jnqf/data/repos/vidgen/scripts/vps_autosync_status.sh

      - name: Collect VPS Diagnostics On Failure
        if: failure() && steps.vps_secrets.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: false
          command_timeout: 20m
          script: |
            set +e
            export REPO_DIR=/docker/openclaw-jnqf/data/repos/vidgen
            export BRANCH=dev
            export LOG_LINES=200
            bash /docker/openclaw-jnqf/data/repos/vidgen/scripts/vps_autosync_status.sh || true
            journalctl -u vidgen-openclaw-autosync.service -n 200 --no-pager || true
