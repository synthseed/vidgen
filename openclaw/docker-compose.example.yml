services:
  openclaw:
    image: ${OPENCLAW_IMAGE}
    container_name: ${OPENCLAW_CONTAINER_NAME}
    restart: unless-stopped
    working_dir: /app/vidgen
    environment:
      OPENCLAW_CONFIG_PATH: /etc/openclaw/openclaw.json5
      NODE_ENV: production
    volumes:
      - ${VIDGEN_REPO_PATH}:/app/vidgen:ro
      - ${OPENCLAW_CONFIG_PATH_HOST}:/etc/openclaw
      - ${OPENCLAW_STATE_PATH_HOST}:/var/lib/openclaw
    command: >
      sh -lc "openclaw gateway"

